# 手動テスト用（本番の定期実行は cron-job.org 等の外部 cron を使用）
# GitHub → Settings → Secrets and variables → Actions に設定:
#   APP_URL     = https://your-app.vercel.app
#   CRON_SECRET = Vercel の CRON_SECRET と同じ値

name: LINE Notify

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Call notification endpoint
        run: |
          set -euo pipefail
          base="${{ secrets.APP_URL }}"
          base="${base%/}"
          url="${base}/api/cron/notify"
          echo "Calling ${url}"
          http_code=$(curl --silent --show-error --output /tmp/notify-response.json --write-out "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$url")
          echo "HTTP ${http_code}"
          cat /tmp/notify-response.json
          echo ""
          if [ "$http_code" != "200" ]; then
            exit 1
          fi
